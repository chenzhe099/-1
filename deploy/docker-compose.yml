version: '3.8'

services:
  # 前端 — Nginx 静态文件服务
  frontend:
    image: nginx:alpine
    container_name: smartfarm-frontend
    ports:
      - "80:80"
    volumes:
      - ../frontend:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
    networks:
      - smartfarm-net

  # 业务后端 — Spring Boot
  backend:
    build: ../backend
    container_name: smartfarm-backend
    ports:
      - "8080:8080"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql:3306/smartfarm
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=smartfarm123
      - SPRING_REDIS_HOST=redis
      - AI_SERVICE_URL=http://ai-service:8000
    depends_on:
      - mysql
      - redis
    networks:
      - smartfarm-net

  # AI 服务 — Python FastAPI
  ai-service:
    build: ../ai-service
    container_name: smartfarm-ai
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://postgres:smartfarm123@postgres:5432/smartfarm
      - REDIS_URL=redis://redis:6379
      - MILVUS_HOST=milvus
      - MODEL_PATH=/models
    volumes:
      - model-data:/models
    depends_on:
      - postgres
      - redis
      - milvus
    networks:
      - smartfarm-net

  # MySQL 关系数据库
  mysql:
    image: mysql:8.0
    container_name: smartfarm-mysql
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: smartfarm123
      MYSQL_DATABASE: smartfarm
    volumes:
      - mysql-data:/var/lib/mysql
      - ../docs/database/migrations:/docker-entrypoint-initdb.d
    networks:
      - smartfarm-net

  # PostgreSQL + PostGIS（地图数据）+ pgvector（向量检索）
  postgres:
    image: pgvector/pgvector:pg16
    container_name: smartfarm-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: smartfarm123
      POSTGRES_DB: smartfarm
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - smartfarm-net

  # Redis 缓存与任务队列
  redis:
    image: redis:7-alpine
    container_name: smartfarm-redis
    ports:
      - "6379:6379"
    networks:
      - smartfarm-net

  # Milvus 向量数据库
  milvus:
    image: milvusdb/milvus:v2.3.0
    container_name: smartfarm-milvus
    ports:
      - "19530:19530"
    environment:
      ETCD_ENDPOINTS: etcd:2379
      MINIO_ADDRESS: minio:9000
    depends_on:
      - etcd
      - minio
    networks:
      - smartfarm-net

  # Milvus 依赖 — etcd
  etcd:
    image: quay.io/coreos/etcd:v3.5.5
    container_name: smartfarm-etcd
    environment:
      ETCD_AUTO_COMPACTION_MODE: revision
      ETCD_AUTO_COMPACTION_RETENTION: "1000"
      ETCD_QUOTA_BACKEND_BYTES: "4294967296"
    volumes:
      - etcd-data:/etcd
    command: etcd -advertise-client-urls=http://127.0.0.1:2379 -listen-client-urls http://0.0.0.0:2379 --data-dir /etcd
    networks:
      - smartfarm-net

  # MinIO 对象存储（文件/图片存储）
  minio:
    image: minio/minio:latest
    container_name: smartfarm-minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin123
    volumes:
      - minio-data:/data
    command: server /data --console-address ":9001"
    networks:
      - smartfarm-net

  # Celery Worker（异步任务）
  celery-worker:
    build: ../ai-service
    container_name: smartfarm-celery
    command: celery -A tasks worker --loglevel=info
    environment:
      - REDIS_URL=redis://redis:6379
      - DATABASE_URL=postgresql://postgres:smartfarm123@postgres:5432/smartfarm
    depends_on:
      - redis
      - postgres
    networks:
      - smartfarm-net

  # 数据管道定时任务
  data-pipeline:
    build: ../data-pipeline
    container_name: smartfarm-pipeline
    environment:
      - DATABASE_URL=postgresql://postgres:smartfarm123@postgres:5432/smartfarm
      - REDIS_URL=redis://redis:6379
    depends_on:
      - postgres
      - redis
    networks:
      - smartfarm-net

volumes:
  mysql-data:
  postgres-data:
  etcd-data:
  minio-data:
  model-data:

networks:
  smartfarm-net:
    driver: bridge
